name: Release

on:
  push:
    tags:
      - "*"
  # Manual trigger as a recovery path. Useful if a tag push fails to fire the
  # workflow (e.g. when commits and tags are pushed together and GitHub
  # processes the tag webhook before indexing the workflow file). The job will
  # build whatever ref you select from the Actions tab.
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history with tags so the release-notes step can find the
          # previous tag and build a Full Changelog compare link.
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # manifest.json is the source of truth for the plugin's version, so the
      # release tag/title always matches what Obsidian's plugin loader sees.
      # This makes the workflow behave identically whether triggered by a tag
      # push (github.ref_name == the tag) or workflow_dispatch from a branch
      # (github.ref_name == the branch, which would otherwise title the
      # release after the branch name).
      - name: Read version from manifest
        id: version
        run: echo "version=$(jq -r .version manifest.json)" >> "$GITHUB_OUTPUT"

      # Collect the release assets that actually exist. main.js and manifest.json
      # are always present; styles.css is optional, so a plugin that needs no
      # stylesheet doesn't have to ship an empty one just to satisfy the release.
      - name: Collect release assets
        id: assets
        run: |
          FILES="main.js manifest.json"
          [ -f styles.css ] && FILES="$FILES styles.css"
          echo "list=$FILES" >> "$GITHUB_OUTPUT"
          {
            echo "paths<<EOF"
            for f in $FILES; do echo "$f"; done
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.assets.outputs.paths }}

      - name: Create or update release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          ASSETS: ${{ steps.assets.outputs.list }}
        run: |
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release $VERSION already exists; re-uploading assets"
            gh release upload "$VERSION" $ASSETS --clobber
          else
            # Build release notes from the latest commit message, followed by a
            # Full Changelog compare link against the previous tag (when one
            # exists). This gives readers the "why" up front instead of just a
            # diff URL.
            COMMIT_NOTES=$(git log -1 --pretty=format:%B)
            PREV_TAG=$(git tag --sort=-creatordate --merged HEAD | grep -v "^${VERSION}$" | head -n 1 || true)
            if [ -n "$PREV_TAG" ]; then
              COMPARE="**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...${VERSION}"
            else
              COMPARE="**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/commits/${VERSION}"
            fi
            NOTES=$(printf "%s\n\n---\n\n%s\n" "$COMMIT_NOTES" "$COMPARE")
            gh release create "$VERSION" \
              --title="$VERSION" \
              --notes "$NOTES" \
              $ASSETS
          fi
